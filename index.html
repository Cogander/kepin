<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚔️ Battle Game 2 Player ⚔️</h1>

<div class="container">

<div class="player">
    <h2>Player 1</h2>
    <p>Health: <span id="player1-health">100</span></p>
</div>

<div class="player">
    <h2>Player 2</h2>
    <p>Health: <span id="player2-health">100</span></p>
</div>

</div>

<div class="buttons">
    <button onclick="attack()">Attack</button>
    <button onclick="heal()">Heal</button>
    <button onclick="specialAttack()">Special</button>
    <button onclick="resetGame()">Reset</button>
</div>

<div id="battle-log" class="log"></div>

<script src="script.js"></script>
</body>
</html>
